name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Discovery Server
      - name: Build Discovery Server
        working-directory: discovery-server
        run: mvn clean package -DskipTests

      - name: Build Discovery Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/discovery-server:latest ./discovery-server

      - name: Push Discovery Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/discovery-server:latest

      # Provider Service
      - name: Build Provider Service
        working-directory: provider-service
        run: mvn clean package -DskipTests

      - name: Build Provider Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/provider-service:latest ./provider-service

      - name: Push Provider Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/provider-service:latest

      # Booking Service
      - name: Build Booking Service
        working-directory: booking-service
        run: mvn clean package -DskipTests

      - name: Build Booking Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/booking-service:latest ./booking-service

      - name: Push Booking Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/booking-service:latest

      # API Gateway
      - name: Build API Gateway
        working-directory: api-gateway
        run: mvn clean package -DskipTests

      - name: Build API Gateway Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest ./api-gateway

      - name: Push API Gateway Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest

      # Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/travel-booking
            docker compose pull
            docker compose up -d
            docker image prune -f