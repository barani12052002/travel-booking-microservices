spring.application.name=booking-service

server.port=8081

eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka/
spring.datasource.url=jdbc:mysql://mysql:3306/travel_booking
spring.datasource.username=root
spring.datasource.password=Barani@2002

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

resilience4j.circuitbreaker.instances.providerService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.providerService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.providerService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.providerService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.providerService.permittedNumberOfCallsInHalfOpenState=3