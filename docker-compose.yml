services:

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: Barani@2002
      MYSQL_DATABASE: travel_booking
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  discovery-server:
    build: ./discovery-server
    image: discovery-server
    container_name: discovery-server
    ports:
      - "8761:8761"

  provider-service:
    build: ./provider-service
    image: provider-service
    container_name: provider-service
    ports:
      - "8082:8082"
    depends_on:
      - discovery-server

  booking-service:
    build: ./booking-service
    image: booking-service
    container_name: booking-service
    ports:
      - "8081:8081"
    depends_on:
      - mysql
      - discovery-server
      - provider-service

  api-gateway:
    build: ./api-gateway
    image: api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - discovery-server
      - booking-service
      - provider-service

volumes:
  mysql-data: