<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Admin Bookings</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>All Bookings</h2>

        <a th:href="@{/admin/dashboard}" class="btn btn-primary">
            Dashboard
        </a>

    </div>

    <table class="table table-bordered table-hover bg-white shadow">

        <thead class="table-dark">

        <tr>

            <th>Reference</th>

            <th>Customer</th>

            <th>Attraction</th>

            <th>Date</th>

            <th>Amount</th>

            <th>Status</th>

            <th>Action</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="booking : ${bookings}">

            <td th:text="${booking.bookingReference}"></td>

            <td th:text="${booking.customerName}"></td>

            <td th:text="${booking.attractionName}"></td>

            <td th:text="${booking.travelDate}"></td>

            <td>
                ₹<span th:text="${booking.totalAmount}"></span>
            </td>

            <td>

                <span
                        th:if="${booking.bookingStatus == 'CONFIRMED'}"
                        class="badge bg-success"
                        th:text="${booking.bookingStatus}">
                </span>

                <span
                        th:if="${booking.bookingStatus == 'CANCELLED'}"
                        class="badge bg-danger"
                        th:text="${booking.bookingStatus}">
                </span>

            </td>

            <td>

                <form
                        th:if="${booking.bookingStatus == 'CONFIRMED'}"
                        th:action="@{'/admin/bookings/cancel/' + ${booking.bookingReference}}"
                        method="post">

                    <button
                            type="submit"
                            class="btn btn-danger btn-sm"
                            onclick="return confirm('Are you sure you want to cancel this booking?')">

                        Cancel Booking

                    </button>

                </form>

                <button
                        th:if="${booking.bookingStatus == 'CANCELLED'}"
                        class="btn btn-secondary btn-sm"
                        disabled>

                    Already Cancelled

                </button>

            </td>

        </tr>

        <tr th:if="${#lists.isEmpty(bookings)}">

            <td colspan="7" class="text-center">

                No bookings found.

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>

</html>
