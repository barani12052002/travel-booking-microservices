<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Manage Bookings</title>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark shadow">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/admin/dashboard">

            🌍 Destinora Admin

        </a>

        <div>

            <a href="/admin/dashboard" class="btn btn-outline-light me-2">
                Dashboard
            </a>

            <a href="/admin/users" class="btn btn-outline-light me-2">
                Users
            </a>

            <a href="/dashboard" class="btn btn-warning">
                User Dashboard
            </a>

        </div>

    </div>

</nav>

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>

            <i class="bi bi-calendar-check-fill"></i>

            Manage Bookings

        </h2>

        <span class="badge bg-primary fs-6">

            Total:
            <span th:text="${#lists.size(bookings)}"></span>

        </span>

    </div>

    <table class="table table-hover table-bordered shadow bg-white align-middle">

        <thead class="table-dark">

        <tr>

            <th>Reference</th>

            <th>Customer</th>

            <th>Attraction</th>

            <th>Travel Date</th>

            <th>Amount</th>

            <th>Status</th>

            <th width="170">Action</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="booking : ${bookings}">

            <td>

                <span class="badge bg-secondary"
                      th:text="${booking.bookingReference}">
                </span>

            </td>

            <td th:text="${booking.customerName}"></td>

            <td th:text="${booking.attractionName}"></td>

            <td th:text="${booking.travelDate}"></td>

            <td class="fw-bold text-success">

                ₹ <span th:text="${booking.totalAmount}"></span>

            </td>

            <td>

                <span
                        th:if="${booking.bookingStatus == 'CONFIRMED'}"
                        class="badge bg-success">

                    <i class="bi bi-check-circle-fill"></i>
                    Confirmed

                </span>

                <span
                        th:if="${booking.bookingStatus == 'CANCELLED'}"
                        class="badge bg-danger">

                    <i class="bi bi-x-circle-fill"></i>
                    Cancelled

                </span>

            </td>

            <td>

                <form
                        th:if="${booking.bookingStatus == 'CONFIRMED'}"
                        th:action="@{'/admin/bookings/cancel/' + ${booking.bookingReference}}"
                        method="post">

                    <button
                            type="submit"
                            class="btn btn-danger btn-sm"
                            onclick="return confirm('Cancel this booking?')">

                        <i class="bi bi-x-circle"></i>

                        Cancel

                    </button>

                </form>

                <button
                        th:if="${booking.bookingStatus == 'CANCELLED'}"
                        class="btn btn-secondary btn-sm"
                        disabled>

                    <i class="bi bi-check2-all"></i>

                    Cancelled

                </button>

            </td>

        </tr>

        <tr th:if="${#lists.isEmpty(bookings)}">

            <td colspan="7" class="text-center">

                No bookings found.

            </td>

        </tr>

        </tbody>

    </table>

    <!-- Pagination -->

    <nav th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center">

            <li class="page-item"
                th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/admin/bookings(page=(${currentPage - 1}))}">
                    Previous
                </a>
            </li>

            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link"
                   th:text="${i + 1}"
                   th:href="@{/admin/bookings(page=${i})}">
                </a>
            </li>

            <li class="page-item"
                th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/admin/bookings(page=(${currentPage + 1}))}">
                    Next
                </a>
            </li>

        </ul>
    </nav>

</div>

</body>

</html>
