<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Destinora Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4">Admin Dashboard</h2>

    <div class="row">

        <div class="col-md-3">

            <div class="card shadow">

                <div class="card-body text-center">

                    <h5>Total Users</h5>

                    <h2 th:text="${dashboard.totalUsers}"></h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card shadow">

                <div class="card-body text-center">

                    <h5>Total Bookings</h5>

                    <h2 th:text="${dashboard.totalBookings}"></h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card shadow">

                <div class="card-body text-center">

                    <h5>Cancelled</h5>

                    <h2 th:text="${dashboard.cancelledBookings}"></h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card shadow">

                <div class="card-body text-center">

                    <h5>Revenue</h5>

                    <h2>
                        ₹<span th:text="${dashboard.totalRevenue}"></span>
                    </h2>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
