<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Manage Users</title>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark shadow">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/admin/dashboard">

            🌍 Destinora Admin

        </a>

        <div>

            <a href="/admin/dashboard" class="btn btn-outline-light me-2">
                <i class="bi bi-speedometer2"></i>
                Dashboard
            </a>

            <a href="/admin/bookings" class="btn btn-outline-light me-2">
                <i class="bi bi-calendar-check-fill"></i>
                Bookings
            </a>

            <a href="/dashboard" class="btn btn-warning">
                <i class="bi bi-house-fill"></i>
                User Dashboard
            </a>

        </div>

    </div>

</nav>

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>

            <i class="bi bi-people-fill"></i>

            Manage Users

        </h2>

        <span class="badge bg-primary fs-6">

            Total Users:
            <span th:text="${#lists.size(users)}"></span>

        </span>

    </div>

    <!-- Search -->

    <form th:action="@{/admin/users}" method="get" class="row g-2 mb-4">

        <div class="col-md-6">

            <input
                    type="text"
                    name="keyword"
                    class="form-control"
                    placeholder="Search by username or email..."
                    th:value="${keyword}">

        </div>

        <div class="col-auto">

            <button class="btn btn-primary" type="submit">

                <i class="bi bi-search"></i>

                Search

            </button>

        </div>

        <div class="col-auto">

            <a th:href="@{/admin/users}"
               class="btn btn-secondary">

                <i class="bi bi-arrow-clockwise"></i>

                Reset

            </a>

        </div>

    </form>

    <!-- Users Table -->

    <table class="table table-hover table-bordered shadow bg-white align-middle">

        <thead class="table-dark">

        <tr>

            <th>ID</th>

            <th>Username</th>

            <th>Email</th>

            <th>Role</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="user : ${users}">

            <td th:text="${user.id}"></td>

            <td>

                <i class="bi bi-person-circle text-primary"></i>

                <span th:text="${user.username}"></span>

            </td>

            <td th:text="${user.email}"></td>

            <td>

                <span
                        th:if="${user.role == 'ADMIN'}"
                        class="badge bg-danger">

                    ADMIN

                </span>

                <span
                        th:if="${user.role == 'USER'}"
                        class="badge bg-success">

                    USER

                </span>

            </td>

        </tr>

        <tr th:if="${#lists.isEmpty(users)}">

            <td colspan="4" class="text-center text-muted">

                <i class="bi bi-search"></i>

                No users found.

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>

</html>
