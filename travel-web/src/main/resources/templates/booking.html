<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Booking</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body style="background:#f4f7fc;">

<div class="container py-5">

    <div class="card shadow-lg border-0">

        <div class="row">

            <div class="col-lg-6">

                <img th:src="${tour.imageUrl}"
                     style="width:100%;height:500px;object-fit:cover;">

            </div>

            <div class="col-lg-6 p-5">

                <h2 th:text="${tour.displayName}"></h2>

                <h5 class="text-primary">

                    ₹<span th:text="${tour.price}"></span>

                </h5>

                <hr>

                <p>

                    <b>Travel Date :</b>

                    <span th:text="${travelDate}"></span>

                </p>

                <p>

                    <b>Adults :</b>

                    <span th:text="${adults}"></span>

                </p>

                <p>

                    <b>Children :</b>

                    <span th:text="${children}"></span>

                </p>

                <hr>

                <h4>Select Time Slot</h4>

                <form action="/price" method="post">

                    <input type="hidden"
                           name="code"
                           th:value="${tour.code}">

                    <input type="hidden"
                           name="travelDate"
                           th:value="${travelDate}">

                    <input type="hidden"
                           name="adults"
                           th:value="${adults}">

                    <input type="hidden"
                           name="children"
                           th:value="${children}">

                    <div th:each="slot:${timeslots}"
                         class="form-check">

                        <input

                                class="form-check-input"

                                type="radio"

                                name="time"

                                th:value="${slot.time}"

                                required>

                        <label

                                class="form-check-label">

                            <span th:text="${slot.time}"></span>

                        </label>

                    </div>

                    <button

                            class="btn btn-success mt-4 w-100">

                        Calculate Price

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>

</html>
