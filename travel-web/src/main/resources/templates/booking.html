<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>My Bookings</title>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
            rel="stylesheet">

    <style>

        body{
            background:#f4f7fc;
            font-family:Segoe UI,sans-serif;
        }

        .booking-card{

            border:none;
            border-radius:18px;
            box-shadow:0 10px 25px rgba(0,0,0,.12);
            transition:.3s;
        }

        .booking-card:hover{

            transform:translateY(-5px);
        }

        .status{

            font-weight:bold;
            padding:8px 18px;
            border-radius:20px;
        }

        .confirmed{

            background:#d1fae5;
            color:#065f46;
        }

        h2{

            font-weight:700;
            color:#1e3a8a;
        }

    </style>

</head>

<body>

<div class="container py-5">

    <div class="d-flex justify-content-between mb-4">

        <h2>

            🎫 My Bookings

        </h2>

        <a href="/dashboard"
           class="btn btn-primary">

            Dashboard

        </a>

    </div>

    <div th:if="${#lists.isEmpty(bookings)}">

        <div class="alert alert-warning text-center">

            No Bookings Found

        </div>

    </div>

    <div class="row g-4">

        <div class="col-lg-6"

             th:each="booking : ${bookings}">

            <div class="card booking-card">

                <div class="card-body">

                    <div class="d-flex justify-content-between">

                        <h4>

                            <span th:text="${booking.attractionCode}"></span>

                        </h4>

                        <span class="status confirmed"

                              th:text="${booking.bookingStatus}">
                        </span>

                    </div>

                    <hr>

                    <p>

                        <b>Booking Reference :</b>

                        <span th:text="${booking.bookingReference}"></span>

                    </p>

                    <p>

                        <b>Provider Booking ID :</b>

                        <span th:text="${booking.providerBookingId}"></span>

                    </p>

                    <p>

                        <b>Travel Date :</b>

                        <span th:text="${booking.travelDate}"></span>

                    </p>

                    <p>

                        <b>Adults :</b>

                        <span th:text="${booking.adultCount}"></span>

                    </p>

                    <p>

                        <b>Children :</b>

                        <span th:text="${booking.childCount}"></span>

                    </p>

                    <p>

                        <b>Total Amount :</b>

                        ₹<span th:text="${booking.totalAmount}"></span>

                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
