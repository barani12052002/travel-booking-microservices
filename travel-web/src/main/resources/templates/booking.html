<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Complete Your Booking</title>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <style>

        body{
            background:#f5f7fb;
            font-family:'Segoe UI',sans-serif;
        }

        .booking-card{
            border:none;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 15px 35px rgba(0,0,0,.12);
        }

        .tour-img{
            width:100%;
            min-height:650px;
            object-fit:cover;
        }

        .section-title{
            color:#1e3a8a;
            font-weight:bold;
        }

        .price{
            font-size:32px;
            color:#0d6efd;
            font-weight:bold;
        }

        .slot{

            border:2px solid #dee2e6;
            border-radius:12px;
            padding:15px;
            margin-bottom:12px;
            cursor:pointer;
            transition:.3s;

        }

        .slot:hover{

            border-color:#0d6efd;
            background:#eef5ff;

        }

        #priceCard{

            display:none;

        }

    </style>

</head>

<body>

<div class="container py-5">

    <div class="card booking-card">

        <div class="row g-0">

            <div class="col-lg-6">

                <img th:src="${tour.imageUrl}"
                     class="tour-img">

            </div>

            <div class="col-lg-6 p-5">

                <h2 class="section-title"
                    th:text="${tour.displayName}">
                </h2>

                <p class="text-muted"
                   th:text="${tour.description}">
                </p>

                <div class="price">

                    ₹<span th:text="${tour.price}"></span>

                </div>

                <hr>

                <h4 class="section-title">

                    Booking Details

                </h4>

                <p>

                    📅 Travel Date :
                    <strong th:text="${travelDate}"></strong>

                </p>

                <p>

                    👨 Adults :
                    <strong th:text="${adults}"></strong>

                </p>

                <p>

                    👧 Children :
                    <strong th:text="${children}"></strong>

                </p>

                <input
                        type="hidden"
                        id="code"
                        th:value="${tour.code}">

                <input
                        type="hidden"
                        id="adultCount"
                        th:value="${adults}">

                <input
                        type="hidden"
                        id="childCount"
                        th:value="${children}">

                <hr>

                <h4 class="section-title">

                    Available Time Slots

                </h4>

                <div
                        th:each="slot : ${timeslots}"
                        class="slot">

                    <input
                            class="form-check-input"
                            type="radio"
                            name="time"
                            th:value="${slot.time}"
                            required>

                    <label
                            class="form-check-label ms-2">

                        <span th:text="${slot.time}"></span>

                    </label>

                </div>
                <!-- Price Summary -->

                <div id="priceCard" class="card mt-4 shadow border-0">

                    <div class="card-header bg-success text-white">

                        <h4 class="mb-0">

                            💰 Price Summary

                        </h4>

                    </div>

                    <div class="card-body">

                        <table class="table">

                            <tr>

                                <td>Adult Price</td>

                                <td>

                                    ₹<span id="adultPrice"></span>

                                </td>

                            </tr>

                            <tr>

                                <td>Child Price</td>

                                <td>

                                    ₹<span id="childPrice"></span>

                                </td>

                            </tr>

                            <tr>

                                <td>Tax</td>

                                <td>

                                    ₹<span id="tax"></span>

                                </td>

                            </tr>

                            <tr>

                                <td>Service Charge</td>

                                <td>

                                    ₹<span id="serviceCharge"></span>

                                </td>

                            </tr>

                            <tr>

                                <td>Discount</td>

                                <td>

                                    ₹<span id="discount"></span>

                                </td>

                            </tr>

                            <tr class="table-success">

                                <th>Total</th>

                                <th>

                                    ₹<span id="totalPrice"></span>

                                </th>

                            </tr>

                        </table>

                        <form action="/confirm-booking"
                              method="post">

                            <input
                                    type="hidden"
                                    name="code"
                                    th:value="${tour.code}">

                            <input
                                    type="hidden"
                                    name="travelDate"
                                    th:value="${travelDate}">

                            <input
                                    type="hidden"
                                    name="adults"
                                    th:value="${adults}">

                            <input
                                    type="hidden"
                                    name="children"
                                    th:value="${children}">

                            <input
                                    type="hidden"
                                    id="hiddenTime"
                                    name="time">

                            <input
                                    type="hidden"
                                    id="hiddenTotal"
                                    name="totalAmount">

                            <input
                                    type="hidden"
                                    id="hiddenCurrency"
                                    name="currency">

                            <button
                                    class="btn btn-success btn-lg w-100">

                                <i class="bi bi-check-circle-fill"></i>

                                Book Now

                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="/js/booking.js"></script>

</body>

</html>
