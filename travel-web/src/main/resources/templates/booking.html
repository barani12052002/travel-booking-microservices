<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Book Tour</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f4f6f8;
        }

        .container{
            margin-top:50px;
            max-width:700px;
        }

        .card{
            padding:35px;
            border:none;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,.15);
        }

    </style>

</head>

<body>

<div class="container">

    <div class="card">

        <h2 class="text-center mb-4">
            🛫 Book Your Tour
        </h2>

        <form th:action="@{/booking}"
              method="post"
              th:object="${booking}">

            <div class="mb-3">

                <label>Name</label>

                <input
                        class="form-control"
                        th:field="*{customerName}">

            </div>

            <div class="mb-3">

                <label>Email</label>

                <input
                        class="form-control"
                        th:field="*{customerEmail}">

            </div>

            <div class="mb-3">

                <label>Phone</label>

                <input
                        class="form-control"
                        th:field="*{customerPhone}">

            </div>

            <div class="mb-3">

                <label>Attraction Code</label>

                <input
                        class="form-control"
                        th:field="*{attractionCode}"
                        value="BURJ001">

            </div>

            <div class="mb-3">

                <label>Travel Date</label>

                <input
                        type="date"
                        class="form-control"
                        th:field="*{travelDate}">

            </div>

            <div class="mb-3">

                <label>Time Slot</label>

                <input
                        class="form-control"
                        th:field="*{timeSlot}">

            </div>

            <div class="row">

                <div class="col">

                    <label>Adults</label>

                    <input
                            type="number"
                            class="form-control"
                            value="1"
                            th:field="*{adultCount}">

                </div>

                <div class="col">

                    <label>Children</label>

                    <input
                            type="number"
                            class="form-control"
                            value="0"
                            th:field="*{childCount}">

                </div>

            </div>

            <br>

            <button
                    class="btn btn-success w-100">

                Book Now

            </button>

        </form>

    </div>

</div>

</body>

</html>
