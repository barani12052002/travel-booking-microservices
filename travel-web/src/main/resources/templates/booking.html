<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Complete Your Booking</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <style>

        body{
            background:#f5f7fb;
            font-family:'Segoe UI',sans-serif;
        }

        .booking-card{
            border:none;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 15px 35px rgba(0,0,0,.12);
        }

        .tour-img{
            width:100%;
            height:100%;
            min-height:550px;
            object-fit:cover;
        }

        .price{
            font-size:28px;
            color:#0d6efd;
            font-weight:bold;
        }

        .section-title{
            font-weight:700;
            color:#1e3a8a;
        }

        .slot{
            padding:12px;
            border:1px solid #ddd;
            border-radius:10px;
            margin-bottom:10px;
        }

    </style>

</head>

<body>

<div class="container py-5">

    <div class="card booking-card">

        <div class="row g-0">

            <div class="col-lg-6">

                <img th:src="${tour.imageUrl}"
                     class="tour-img">

            </div>

            <div class="col-lg-6 p-5">

                <h2 class="section-title"
                    th:text="${tour.displayName}">
                </h2>

                <p class="text-muted"
                   th:text="${tour.description}">
                </p>

                <div class="price mb-4">

                    ₹<span th:text="${tour.price}"></span>

                </div>

                <hr>

                <form action="/price"
                      method="post">

                    <input type="hidden"
                           name="code"
                           th:value="${tour.code}">

                    <input type="hidden"
                           name="travelDate"
                           th:value="${travelDate}">

                    <input type="hidden"
                           name="adults"
                           th:value="${adults}">

                    <input type="hidden"
                           name="children"
                           th:value="${children}">

                    <h5 class="section-title mb-3">

                        Booking Details

                    </h5>

                    <p>

                        📅 Travel Date :
                        <strong th:text="${travelDate}"></strong>

                    </p>

                    <p>

                        👨 Adults :
                        <strong th:text="${adults}"></strong>

                    </p>

                    <p>

                        👧 Children :
                        <strong th:text="${children}"></strong>

                    </p>

                    <hr>

                    <h5 class="section-title">

                        Select Time Slot

                    </h5>

                    <div th:each="slot : ${timeslots}"
                         class="slot">

                        <input class="form-check-input"
                               type="radio"
                               name="time"
                               th:value="${slot.time}"
                               required>

                        <label class="form-check-label ms-2">

                            <span th:text="${slot.time}"></span>

                        </label>

                    </div>

                    <button class="btn btn-success btn-lg w-100 mt-4">

                        <i class="bi bi-credit-card"></i>

                        Calculate Price

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>

</html>
