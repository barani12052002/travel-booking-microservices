<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <title>My Bookings</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --ink: #14213d;
      --ink-soft: #4a5568;
      --gold: #c8963e;
      --gold-dark: #a97b2f;
      --teal: #0f6b64;
      --paper: #faf8f5;
      --line: #e7e2d9;
    }

    * { box-sizing: border-box; }

    body {
      background: var(--paper);
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--ink);
    }

    h1, h2, h3, h4, .display-font {
      font-family: 'Fraunces', serif;
    }

    .util-bar {
      background: var(--ink);
      color: #fff;
      font-size: 0.82rem;
      padding: 8px 0;
      letter-spacing: 0.02em;
    }

    /* Page header */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 32px;
    }

    .page-header h2 {
      font-weight: 700;
      font-size: 2rem;
      margin-bottom: 4px;
      color: var(--ink);
    }

    .page-header .subtitle {
      color: var(--ink-soft);
      font-size: 0.95rem;
    }

    .icon-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      background: var(--ink);
      border-radius: 12px;
      color: var(--gold);
      font-size: 1.3rem;
      margin-right: 12px;
    }

    .btn-dashboard {
      background: #fff;
      border: 1.5px solid var(--ink);
      color: var(--ink);
      font-weight: 700;
      font-size: 0.92rem;
      padding: 11px 22px;
      border-radius: 12px;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-dashboard:hover {
      background: var(--ink);
      color: #fff;
    }

    /* Empty state */
    .empty-state {
      background: #fff;
      border: 1.5px dashed var(--line);
      border-radius: 20px;
      padding: 60px 30px;
      text-align: center;
    }

    .empty-state i {
      font-size: 3rem;
      color: var(--gold);
      margin-bottom: 16px;
      display: block;
    }

    .empty-state h4 {
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 8px;
    }

    .empty-state p {
      color: var(--ink-soft);
      margin-bottom: 20px;
    }

    /* Booking card */
    .booking-card {
      border: none;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(20,33,61,0.08);
      background: #fff;
      transition: all 0.25s ease;
      overflow: hidden;
      height: 100%;
    }

    .booking-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 44px rgba(20,33,61,0.14);
    }

    .card-top {
      background: linear-gradient(135deg, #14213d 0%, #1d3159 100%);
      padding: 18px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .attraction-code {
      font-family: 'Fraunces', serif;
      font-size: 1.25rem;
      font-weight: 600;
      color: #fff;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .attraction-code i { color: var(--gold); font-size: 1.05rem; }

    .status {
      font-weight: 700;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 6px 14px;
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }

    .status::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
    }

    .confirmed {
      background: rgba(255,255,255,0.15);
      color: #b7f5c9;
    }

    .confirmed::before { background: #4ade80; }

    .card-body-inner {
      padding: 22px;
    }

    .ref-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 14px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--line);
    }

    .ref-row .ref-item .label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--ink-soft);
      font-weight: 700;
      margin-bottom: 3px;
    }

    .ref-row .ref-item .value {
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--ink);
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .detail-box {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
    }

    .detail-box .label {
      font-size: 0.66rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--ink-soft);
      font-weight: 700;
      margin-bottom: 3px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .detail-box .label i { color: var(--teal); font-size: 0.78rem; }

    .detail-box .value {
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--ink);
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 16px;
    }

    .total-row .label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--ink-soft);
    }

    .total-row .amount {
      font-family: 'Fraunces', serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--ink);
    }

    @media (max-width: 575px) {
      .detail-grid { grid-template-columns: 1fr 1fr; }
      .page-header { align-items: flex-start; }
    }
  </style>
</head>

<body>

<div class="util-bar">
  <div class="container d-flex justify-content-between">
    <span><i class="bi bi-shield-check"></i>&nbsp; Verified Operator</span>
    <span class="d-none d-sm-inline"><i class="bi bi-headset"></i>&nbsp; 24/7 Support</span>
  </div>
</div>

<div class="container py-4 py-lg-5">

  <div class="page-header">
    <div class="d-flex align-items-center">
      <span class="icon-badge"><i class="bi bi-ticket-perforated"></i></span>
      <div>
        <h2 class="mb-0">My Bookings</h2>
        <div class="subtitle">All your confirmed trips in one place</div>
      </div>
    </div>

    <a th:href="@{/dashboard}" class="btn-dashboard">
      <i class="bi bi-house-door"></i> Dashboard
    </a>
  </div>

  <div th:if="${#lists.isEmpty(bookings)}">
    <div class="empty-state">
      <i class="bi bi-ticket-detailed"></i>
      <h4>No Bookings Found</h4>
      <p>You haven't made any bookings yet. Start exploring tours to plan your next trip.</p>
      <a th:href="@{/search}" class="btn btn-primary-gold" style="background:var(--gold); border:none; color:var(--ink); font-weight:700; padding:11px 24px; border-radius:12px;">
        Browse Tours
      </a>
    </div>
  </div>

  <div class="row g-4">

    <div class="col-lg-6" th:each="booking : ${bookings}">

      <div class="card booking-card">

        <div class="card-top">
          <h4 class="attraction-code">
            <i class="bi bi-geo-alt-fill"></i>
            <span th:text="${booking.attractionCode}"></span>
          </h4>
          <span class="status"
                th:classappend="${booking.bookingStatus == 'CONFIRMED'} ? ' confirmed' : ' cancelled'"
                th:text="${booking.bookingStatus}">
</span>
        </div>

        <div class="card-body-inner">

          <div class="ref-row">
            <div class="ref-item">
              <div class="label">Booking Reference</div>
              <div class="value" th:text="${booking.bookingReference}"></div>
            </div>
            <div class="ref-item text-end">
              <div class="label">Provider ID</div>
              <div class="value" th:text="${booking.providerBookingId}"></div>
            </div>
          </div>

          <div class="detail-grid">
            <div class="detail-box">
              <div class="label"><i class="bi bi-calendar-event"></i> Travel Date</div>
              <div class="value"
                   th:text="${#temporals.format(booking.travelDate,'dd MMM yyyy')}">
              </div>
            </div>
            <div class="detail-box">
              <div class="label"><i class="bi bi-person-fill"></i> Adults</div>
              <div class="value" th:text="${booking.adultCount}"></div>
            </div>
            <div class="detail-box">
              <div class="label"><i class="bi bi-person"></i> Children</div>
              <div class="value" th:text="${booking.childCount}"></div>
            </div>
          </div>

          <div class="total-row">
            <span class="label">Total Amount</span>
            <span class="amount">₹<span th:text="${#numbers.formatDecimal(booking.totalAmount,1,2)}"></span></span>
          </div>

        </div>

      </div>

    </div>

  </div>

</div>

</body>

</html>
