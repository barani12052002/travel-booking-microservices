<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Tour Details</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --ink: #14213d;
            --ink-soft: #4a5568;
            --gold: #c8963e;
            --gold-dark: #a97b2f;
            --teal: #0f6b64;
            --paper: #faf8f5;
            --line: #e7e2d9;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--paper);
            color: var(--ink);
        }

        h1, h2, h3, .display-font {
            font-family: 'Fraunces', serif;
        }

        /* Top utility bar */
        .util-bar {
            background: var(--ink);
            color: #fff;
            font-size: 0.82rem;
            padding: 8px 0;
            letter-spacing: 0.02em;
        }

        .back-link {
            color: var(--ink-soft);
            font-weight: 600;
            font-size: 0.92rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s ease;
        }

        .back-link:hover { color: var(--ink); }

        /* Gallery / hero image */
        .hero-frame {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            min-height: 560px;
            height: 100%;
            background: #e9e4da;
        }

        .hero-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            min-height: 560px;
        }

        .hero-gradient {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(20,33,61,0) 45%, rgba(20,33,61,0.75) 100%);
            pointer-events: none;
        }

        .rating-chip {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(6px);
            border-radius: 999px;
            padding: 8px 16px;
            font-weight: 700;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }

        .rating-chip i { color: var(--gold); }

        .hero-caption {
            position: absolute;
            bottom: 24px;
            left: 24px;
            right: 24px;
            color: #fff;
        }

        .hero-caption .badge-curated {
            background: var(--gold);
            color: var(--ink);
            font-weight: 700;
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 6px 12px;
            border-radius: 999px;
        }

        /* Right panel card */
        .booking-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(20,33,61,0.10);
            border: 1px solid var(--line);
        }

        .tour-title {
            font-size: 2.1rem;
            font-weight: 700;
            line-height: 1.15;
            color: var(--ink);
        }

        .tour-desc {
            color: var(--ink-soft);
            font-size: 1rem;
            line-height: 1.7;
        }

        .stat-box {
            background: var(--paper);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 14px 16px;
        }

        .stat-box .label {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--ink-soft);
            font-weight: 600;
            margin-bottom: 4px;
        }

        .stat-box .value {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--ink);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-box .value i { color: var(--teal); }

        .price-strip {
            background: linear-gradient(135deg, #14213d 0%, #1d3159 100%);
            border-radius: 16px;
            padding: 22px 24px;
            color: #fff;
        }

        .price-strip .label {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: rgba(255,255,255,0.7);
            font-weight: 600;
        }

        .price-strip .amount {
            font-family: 'Fraunces', serif;
            font-size: 2.4rem;
            font-weight: 600;
            line-height: 1.1;
        }

        .price-strip .amount sup {
            font-size: 1rem;
            font-weight: 500;
            top: -0.9em;
        }

        .price-strip .per-person {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.65);
        }

        /* Form styling */
        .section-label {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .section-label i { color: var(--gold-dark); }

        .form-control, .form-select {
            border: 1.5px solid var(--line);
            border-radius: 12px;
            padding: 11px 14px;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--ink);
            background: var(--paper);
            transition: all 0.2s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 4px rgba(15,107,100,0.10);
            background: #fff;
        }

        .qty-group {
            border: 1.5px solid var(--line);
            border-radius: 12px;
            background: var(--paper);
            overflow: hidden;
        }

        .qty-group label {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700;
            color: var(--ink-soft);
            padding: 8px 12px 0;
            display: block;
        }

        .qty-group input {
            border: none;
            background: transparent;
            font-weight: 700;
            font-size: 1.05rem;
            padding: 2px 12px 10px;
            color: var(--ink);
        }

        .qty-group input:focus {
            outline: none;
            box-shadow: none;
        }

        .btn-book {
            background: var(--gold);
            border: none;
            color: var(--ink);
            font-weight: 700;
            font-size: 1.05rem;
            padding: 15px;
            border-radius: 14px;
            letter-spacing: 0.01em;
            transition: all 0.2s ease;
            box-shadow: 0 8px 24px rgba(200,150,62,0.35);
        }

        .btn-book:hover {
            background: var(--gold-dark);
            transform: translateY(-1px);
            box-shadow: 0 10px 28px rgba(200,150,62,0.42);
            color: var(--ink);
        }

        .trust-row {
            font-size: 0.82rem;
            color: var(--ink-soft);
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }

        .trust-row span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .trust-row i { color: var(--teal); }

        @media (max-width: 991px) {
            .hero-frame, .hero-frame img { min-height: 340px; }
            .tour-title { font-size: 1.6rem; }
        }
    </style>
</head>

<body>

<div class="util-bar">
    <div class="container d-flex justify-content-between">
        <span><i class="bi bi-shield-check"></i>&nbsp; Verified Operator</span>
        <span class="d-none d-sm-inline"><i class="bi bi-headset"></i>&nbsp; 24/7 Support</span>
    </div>
</div>

<div class="container py-4 py-lg-5">

    <a th:href="@{/search}" class="back-link mb-4">
        <i class="bi bi-arrow-left"></i> Back to Tours
    </a>

    <div class="row g-4 mt-1">

        <!-- Image column -->
        <div class="col-lg-6">
            <div class="hero-frame">
                <img th:src="${tour.imageUrl}" alt="Tour image">
                <div class="hero-gradient"></div>

                <div class="rating-chip">
                    <i class="bi bi-star-fill"></i>
                    <span th:text="${tour.rating}"></span>
                    <span class="text-muted fw-normal">/ 5</span>
                </div>

                <div class="hero-caption">
                    <span class="badge-curated">Curated Experience</span>
                </div>
            </div>
        </div>

        <!-- Details + booking column -->
        <div class="col-lg-6">
            <div class="booking-card p-4 p-lg-5 h-100 d-flex flex-column">

                <h1 class="tour-title mb-3" th:text="${tour.displayName}"></h1>

                <p class="tour-desc mb-4" th:text="${tour.description}"></p>

                <div class="row g-3 mb-4">
                    <div class="col-6">
                        <div class="stat-box">
                            <div class="label">Duration</div>
                            <div class="value">
                                <i class="bi bi-clock-history"></i>
                                <span th:text="${tour.duration}"></span>
                            </div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="stat-box">
                            <div class="label">Available Slots</div>
                            <div class="value">
                                <i class="bi bi-people-fill"></i>
                                <span th:text="${tour.availableSlots}"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="price-strip mb-4 d-flex justify-content-between align-items-end">
                    <div>
                        <div class="label">Starting from</div>
                        <div class="amount"><sup>₹</sup><span th:text="${tour.price}"></span></div>
                    </div>
                    <div class="per-person mb-1">per person</div>
                </div>

                <hr class="mb-4" style="border-color: var(--line);">

                <form action="/booking" method="get">

                    <input type="hidden" name="code" th:value="${tour.code}">

                    <div class="mb-3">
                        <label class="section-label"><i class="bi bi-calendar-event"></i> Travel Date</label>
                        <input type="date" class="form-control" name="travelDate" required>
                    </div>

                    <div class="mb-4">
                        <label class="section-label"><i class="bi bi-person-lines-fill"></i> Travelers</label>
                        <div class="row g-3">
                            <div class="col-6">
                                <div class="qty-group">
                                    <label>Adults</label>
                                    <input type="number" class="form-control" value="1" min="1" name="adults">
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="qty-group">
                                    <label>Children</label>
                                    <input type="number" class="form-control" value="0" min="0" name="children">
                                </div>
                            </div>
                        </div>
                    </div>

                    <button class="btn btn-book w-100" type="submit">
                        Continue Booking <i class="bi bi-arrow-right ms-1"></i>
                    </button>

                    <div class="trust-row justify-content-center mt-3 pt-3" style="border-top: 1px solid var(--line);">
                        <span><i class="bi bi-shield-lock"></i> Secure checkout</span>
                        <span><i class="bi bi-arrow-repeat"></i> Free cancellation</span>
                        <span><i class="bi bi-patch-check"></i> Best price guarantee</span>
                    </div>

                </form>

            </div>
        </div>

    </div>
</div>

</body>
</html>
