<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Tour Details</title>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

</head>

<body style="background:#f4f7fb;">

<div class="container py-5">

    <a href="/search"
       class="btn btn-outline-primary mb-4">

        ← Back to Tours

    </a>

    <div class="card shadow-lg border-0 rounded-4">

        <div class="row g-0">

            <div class="col-lg-6">

                <img th:src="${tour.imageUrl}"
                     class="img-fluid w-100 h-100"
                     style="object-fit:cover;min-height:500px;">

            </div>

            <div class="col-lg-6">

                <div class="p-5">

                    <h1 th:text="${tour.displayName}"></h1>

                    <h4 class="text-warning">

                        ⭐
                        <span th:text="${tour.rating}"></span>

                    </h4>

                    <hr>

                    <p class="lead"
                       th:text="${tour.description}">
                    </p>

                    <div class="row mt-4">

                        <div class="col-6">

                            <h6>Duration</h6>

                            <p th:text="${tour.duration}"></p>

                        </div>

                        <div class="col-6">

                            <h6>Available Slots</h6>

                            <p th:text="${tour.availableSlots}"></p>

                        </div>

                    </div>

                    <div class="mt-4">

                        <h2 class="text-primary">

                            ₹
                            <span th:text="${tour.price}"></span>

                        </h2>

                    </div>

                    <hr>

                    <form action="/booking"
                          method="get">

                        <input
                                type="hidden"
                                name="code"
                                th:value="${tour.code}">

                        <label class="form-label">

                            Travel Date

                        </label>

                        <input
                                type="date"
                                class="form-control mb-3"
                                name="travelDate"
                                required>

                        <div class="row">

                            <div class="col">

                                <label>

                                    Adults

                                </label>

                                <input
                                        type="number"
                                        class="form-control"
                                        value="1"
                                        min="1"
                                        name="adults">

                            </div>

                            <div class="col">

                                <label>

                                    Children

                                </label>

                                <input
                                        type="number"
                                        class="form-control"
                                        value="0"
                                        min="0"
                                        name="children">

                            </div>

                        </div>

                        <button
                                class="btn btn-success btn-lg w-100 mt-4">

                            Continue Booking

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
