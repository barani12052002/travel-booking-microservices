<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Destination Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-5">

    <a href="/search" class="btn btn-outline-secondary mb-4">
        <i class="bi bi-arrow-left"></i>
        Back
    </a>

    <div class="card shadow-lg border-0 rounded-4">

        <div class="row g-0">

            <div class="col-md-5">

                <img class="img-fluid rounded-start h-100"
                     style="object-fit:cover;"
                     src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">

            </div>

            <div class="col-md-7">

                <div class="card-body p-5">

                    <h2 th:text="${attraction.displayName}">
                        Goa
                    </h2>

                    <p class="text-warning fs-5">

                        ★★★★★

                    </p>

                    <h3 class="text-primary">

                        ₹2999

                    </h3>

                    <hr>

                    <p>

                        Enjoy a wonderful holiday with beautiful scenery,
                        comfortable accommodation and unforgettable memories.

                    </p>

                    <div class="row">

                        <div class="col-md-6">

                            <p>
                                <strong>Duration</strong><br>
                                3 Days / 2 Nights
                            </p>

                        </div>

                        <div class="col-md-6">

                            <p>
                                <strong>Available Slots</strong><br>
                                25
                            </p>

                        </div>

                    </div>

                    <form action="/booking" method="get">

                        <input type="hidden"
                               name="code"
                               th:value="${attraction.code}">

                        <button class="btn btn-primary btn-lg mt-3">

                            Continue Booking

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
