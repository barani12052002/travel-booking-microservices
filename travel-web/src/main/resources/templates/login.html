<form action="/login" method="post">

    <input
            class="form-control"
            type="email"
            name="email"
            placeholder="Email"
            required>

    <input
            class="form-control mt-3"
            type="password"
            name="password"
            placeholder="Password"
            required>

    <button
            class="btn btn-success mt-4 w-100">

        Login

    </button>

</form>
