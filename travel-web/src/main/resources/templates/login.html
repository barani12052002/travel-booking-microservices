<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Login • Destinora</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        :root{
            --dusk-teal:#0B2E3C;
            --dusk-teal-deep:#071E28;
            --sunrise-gold:#E8A34D;
            --sunrise-gold-soft:#F3C583;
            --sand:#F7F0E4;
            --ink:#12242B;
            --coral:#D9704F;
            --paper:#FFFDF9;
            --glass-border:rgba(255,255,255,.28);
            --weak:#D9704F;
            --medium:#E8A34D;
            --strong:#3E8F6F;
        }

        html{
            scroll-behavior:smooth;
        }

        body{

            min-height:100vh;

            background:
                    linear-gradient(180deg, rgba(7,20,28,.58) 0%, rgba(7,24,32,.68) 45%, rgba(5,16,22,.86) 100%),
                    url("https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?auto=format&fit=crop&w=1800&q=80");

            background-size:cover;

            background-position:center;

            background-attachment:fixed;

            display:flex;

            justify-content:center;

            align-items:center;

            font-family:'Inter','Segoe UI',sans-serif;

            color:var(--ink);

            position:relative;

            overflow-x:hidden;

            padding:24px;

        }

        h2,.logo-word{
            font-family:'Fraunces',Georgia,serif;
        }

        .overlay{

            position:absolute;

            inset:0;

            background:
                    radial-gradient(1100px 620px at 14% 8%, rgba(232,163,77,.16), transparent 62%),
                    radial-gradient(900px 700px at 88% 92%, rgba(217,112,79,.14), transparent 60%),
                    rgba(7,20,28,.18);

            pointer-events:none;

        }

        /* gentle floating light, CSS only */
        .glow-drift{
            position:absolute;
            z-index:1;
            width:640px;
            height:640px;
            top:-220px;
            left:-200px;
            border-radius:50%;
            background:radial-gradient(circle, rgba(243,197,131,.20) 0%, transparent 68%);
            filter:blur(4px);
            animation:drift 16s ease-in-out infinite;
            pointer-events:none;
        }

        .glow-drift.two{
            top:auto;
            left:auto;
            bottom:-260px;
            right:-220px;
            width:560px;
            height:560px;
            background:radial-gradient(circle, rgba(217,112,79,.16) 0%, transparent 68%);
            animation-duration:19s;
            animation-delay:-4s;
        }

        @keyframes drift{
            0%,100%{ transform:translate(0,0) scale(1); }
            50%{ transform:translate(26px,22px) scale(1.05); }
        }

        /* wayfinding compass watermark, echoes the register/home page signature */
        .compass-mark{
            position:absolute;
            z-index:1;
            left:-110px;
            bottom:-110px;
            width:420px;
            height:420px;
            opacity:.12;
            pointer-events:none;
            animation:spin-slow 90s linear infinite;
        }

        @keyframes spin-slow{
            from{ transform:rotate(0deg); }
            to{ transform:rotate(360deg); }
        }

        .brand-bar{
            position:absolute;
            z-index:3;
            top:28px;
            left:48px;
            display:flex;
            align-items:center;
            gap:8px;
            animation:fade-down .7s cubic-bezier(.16,1,.3,1) both;
        }

        .brand-mark{
            color:var(--paper);
            font-size:20px;
            font-weight:600;
            letter-spacing:.02em;
            font-family:'Fraunces',Georgia,serif;
        }

        .brand-mark span{
            color:var(--sunrise-gold);
        }

        .login-card{

            position:relative;

            z-index:2;

            width:440px;

            max-width:100%;

            background:linear-gradient(180deg, rgba(255,253,249,.86) 0%, rgba(255,253,249,.78) 100%);

            -webkit-backdrop-filter:blur(22px) saturate(140%);

            backdrop-filter:blur(22px) saturate(140%);

            border-radius:22px;

            padding:46px 42px;

            box-shadow:
                    0 40px 90px rgba(5,16,22,.55),
                    0 12px 28px rgba(5,16,22,.28),
                    0 1.5px 0 rgba(255,255,255,.7) inset;

            border:1px solid var(--glass-border);

            animation:card-rise .8s cubic-bezier(.16,1,.3,1) both;

            animation-delay:.08s;

        }

        @keyframes fade-down{
            from{ opacity:0; transform:translateY(-10px); }
            to{ opacity:1; transform:translateY(0); }
        }

        @keyframes card-rise{
            from{ opacity:0; transform:translateY(22px) scale(.98); }
            to{ opacity:1; transform:translateY(0) scale(1); }
        }

        .eyebrow{
            display:flex;
            align-items:center;
            justify-content:center;
            gap:10px;
            color:var(--coral);
            font-size:12px;
            letter-spacing:.2em;
            text-transform:uppercase;
            font-weight:600;
            margin-bottom:14px;
        }

        .eyebrow::before,
        .eyebrow::after{
            content:"";
            display:block;
            width:22px;
            height:1px;
            background:var(--coral);
            opacity:.5;
        }

        h2{

            font-weight:700;

            color:var(--dusk-teal);

            font-size:30px;

            margin-bottom:6px;

        }

        .text-muted{
            font-family:'Fraunces',Georgia,serif;
            font-style:italic;
            color:#5A6B70 !important;
            font-size:15px;
        }

        label{
            font-size:13px;
            font-weight:600;
            letter-spacing:.02em;
            color:var(--dusk-teal);
            margin-bottom:6px;
            display:inline-block;
        }

        .input-shell{
            position:relative;
        }

        .input-icon{
            position:absolute;
            left:16px;
            top:50%;
            transform:translateY(-50%);
            color:#9AA9AC;
            font-size:16px;
            pointer-events:none;
            transition:color .2s ease;
        }

        .input-shell:focus-within .input-icon{
            color:var(--sunrise-gold);
        }

        .form-control{

            height:50px;

            border-radius:10px;

            border:1.5px solid #E4DDD0;

            background:var(--sand);

            font-size:15px;

            padding-left:44px;

            transition:border-color .2s ease, box-shadow .2s ease, background .2s ease, transform .15s ease;

        }

        .form-control.has-toggle{
            padding-right:44px;
        }

        .form-control:focus{

            border-color:var(--sunrise-gold);

            background:var(--paper);

            box-shadow:0 0 0 .2rem rgba(232,163,77,.22);

            transform:translateY(-1px);

        }

        .toggle-visibility{
            position:absolute;
            right:14px;
            top:50%;
            transform:translateY(-50%);
            background:none;
            border:none;
            color:#9AA9AC;
            font-size:16px;
            padding:4px;
            line-height:1;
            cursor:pointer;
            transition:color .2s ease;
        }

        .toggle-visibility:hover,
        .toggle-visibility:focus-visible{
            color:var(--dusk-teal);
        }

        .toggle-visibility:focus-visible{
            outline:2px solid var(--sunrise-gold-soft);
            outline-offset:2px;
            border-radius:6px;
        }

        .forgot-row{
            display:flex;
            justify-content:flex-end;
            margin-top:10px;
        }

        .forgot-link{
            font-size:12.5px;
            font-weight:600;
            color:#5A6B70;
            letter-spacing:.01em;
        }

        .forgot-link:hover{
            color:var(--coral);
            text-decoration:underline;
            text-underline-offset:3px;
        }

        .forgot-link:focus-visible{
            outline:2px solid var(--sunrise-gold-soft);
            outline-offset:3px;
            border-radius:4px;
        }

        .btn-login{

            height:50px;

            border-radius:10px;

            font-size:16px;

            font-weight:600;

            letter-spacing:.01em;

            background:linear-gradient(135deg, var(--dusk-teal) 0%, var(--dusk-teal-deep) 100%);

            border:none;

            color:var(--paper);

            position:relative;

            overflow:hidden;

            transition:transform .22s cubic-bezier(.16,1,.3,1), box-shadow .22s ease, background .3s ease;

            box-shadow:0 10px 24px rgba(11,46,60,.35);

        }

        .btn-login::before{
            content:"";
            position:absolute;
            inset:0;
            background:linear-gradient(135deg, var(--coral) 0%, var(--sunrise-gold) 100%);
            opacity:0;
            transition:opacity .3s ease;
        }

        .btn-login span{
            position:relative;
            z-index:1;
        }

        .btn-login:hover,
        .btn-login:focus{

            color:var(--paper);

            transform:translateY(-2px);

            box-shadow:0 16px 32px rgba(217,112,79,.4), 0 0 0 1px rgba(243,197,131,.3);

        }

        .btn-login:hover::before,
        .btn-login:focus::before{
            opacity:1;
        }

        .btn-login:active{
            transform:translateY(0);
        }

        .btn-login:focus-visible{
            outline:3px solid var(--sunrise-gold-soft);
            outline-offset:2px;
        }

        .logo{

            font-size:42px;

            line-height:1;

            margin-bottom:6px;

        }

        hr{
            border-color:#E4DDD0;
            opacity:1;
            margin:26px 0 18px;
        }

        .register-row{
            font-size:14.5px;
            color:#5A6B70;
        }

        a{

            text-decoration:none;

            color:var(--coral);

            font-weight:600;

            transition:color .2s ease;

        }

        a:hover{
            color:var(--dusk-teal);
            text-decoration:underline;
            text-underline-offset:3px;
        }

        a:focus-visible{
            outline:2px solid var(--sunrise-gold-soft);
            outline-offset:3px;
            border-radius:4px;
        }

        .text-center.mb-4 p{
            margin-top:2px;
        }

        .mb-3, .mb-4{
            animation:fade-up .6s cubic-bezier(.16,1,.3,1) both;
        }

        .mb-3:nth-of-type(1){ animation-delay:.18s; }
        .mb-3:nth-of-type(2){ animation-delay:.26s; }
        .mb-4{ animation-delay:.34s; }

        @keyframes fade-up{
            from{ opacity:0; transform:translateY(10px); }
            to{ opacity:1; transform:translateY(0); }
        }

        @media (max-width:480px){
            .brand-bar{ left:20px; top:20px; }
            .login-card{ padding:36px 26px; }
            .compass-mark{ width:260px; height:260px; left:-70px; bottom:-70px; }
            .glow-drift{ width:400px; height:400px; }
            .glow-drift.two{ width:360px; height:360px; }
        }

        @media (prefers-reduced-motion:reduce){
            .form-control, .btn-login, a, .toggle-visibility, .input-icon, .forgot-link{ transition:none; }
            .login-card, .brand-bar, .mb-3, .mb-4{ animation:none; }
            .compass-mark, .glow-drift{ animation:none; }
        }

    </style>

</head>

<body>

<div class="overlay"></div>

<div class="glow-drift" aria-hidden="true"></div>
<div class="glow-drift two" aria-hidden="true"></div>

<svg class="compass-mark" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <circle cx="100" cy="100" r="98" fill="none" stroke="#F3C583" stroke-width="1"/>
    <circle cx="100" cy="100" r="80" fill="none" stroke="#F3C583" stroke-width="1"/>
    <g stroke="#F3C583" stroke-width="1">
        <line x1="100" y1="6" x2="100" y2="26"/>
        <line x1="100" y1="174" x2="100" y2="194"/>
        <line x1="6" y1="100" x2="26" y2="100"/>
        <line x1="174" y1="100" x2="194" y2="100"/>
    </g>
    <path d="M100 30 L112 100 L100 170 L88 100 Z" fill="#F3C583"/>
    <path d="M30 100 L100 88 L170 100 L100 112 Z" fill="#F3C583" opacity=".55"/>
    <circle cx="100" cy="100" r="5" fill="#F3C583"/>
</svg>

<div class="brand-bar">
    <span class="brand-mark">Destinora<span>.</span></span>
</div>

<div class="login-card">

    <div class="text-center mb-4">

        <div class="logo">
            🌍
        </div>

        <span class="eyebrow">Member Access</span>

        <h2>Welcome Back</h2>

        <p class="text-muted">

            Continue your journey with Destinora

        </p>

    </div>

    <form action="/login" method="post" novalidate>

        <div class="mb-3">

            <label for="email">Email</label>

            <div class="input-shell">
                <i class="bi bi-envelope input-icon" aria-hidden="true"></i>
                <input
                        id="email"
                        type="email"
                        name="email"
                        class="form-control"
                        placeholder="Enter your email"
                        autocomplete="email"
                        required>
            </div>

        </div>

        <div class="mb-4">

            <label for="password">Password</label>

            <div class="input-shell">
                <i class="bi bi-lock input-icon" aria-hidden="true"></i>
                <input
                        id="password"
                        type="password"
                        name="password"
                        class="form-control has-toggle"
                        placeholder="Enter your password"
                        autocomplete="current-password"
                        required>
                <button type="button" class="toggle-visibility" id="toggleVisibility" aria-label="Show password" aria-pressed="false">
                    <i class="bi bi-eye" id="toggleIcon" aria-hidden="true"></i>
                </button>
            </div>

            <div class="forgot-row">
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>

        </div>

        <button class="btn btn-primary w-100 btn-login" type="submit">

            <span>Login</span>

        </button>

    </form>

    <hr>

    <div class="text-center register-row">

        Don't have an account?

        <a href="/register">

            Register

        </a>

    </div>

</div>

<script>
    (function(){
        var pwdInput = document.getElementById('password');
        var toggleBtn = document.getElementById('toggleVisibility');
        var toggleIcon = document.getElementById('toggleIcon');

        toggleBtn.addEventListener('click', function(){
            var isPassword = pwdInput.getAttribute('type') === 'password';
            pwdInput.setAttribute('type', isPassword ? 'text' : 'password');
            toggleIcon.className = isPassword ? 'bi bi-eye-slash' : 'bi bi-eye';
            toggleBtn.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
            toggleBtn.setAttribute('aria-pressed', isPassword ? 'true' : 'false');
        });
    })();
</script>

</body>
</html>
