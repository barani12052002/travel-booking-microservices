<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Price Summary</title>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body style="background:#f4f7fc;">

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow-lg border-0">

                <div class="card-header bg-primary text-white">

                    <h3>Price Summary</h3>

                </div>

                <div class="card-body">

                    <h2 th:text="${tour.displayName}"></h2>

                    <hr>

                    <p>

                        <b>Travel Date :</b>

                        <span th:text="${travelDate}"></span>

                    </p>

                    <p>

                        <b>Time Slot :</b>

                        <span th:text="${time}"></span>

                    </p>

                    <p>

                        <b>Adults :</b>

                        <span th:text="${adults}"></span>

                    </p>

                    <p>

                        <b>Children :</b>

                        <span th:text="${children}"></span>

                    </p>

                    <hr>

                    <table class="table">

                        <tr>

                            <td>Adult Price</td>

                            <td>
                                ₹
                                <span th:text="${price.adultPrice}"></span>
                            </td>

                        </tr>

                        <tr>

                            <td>Child Price</td>

                            <td>
                                ₹
                                <span th:text="${price.childPrice}"></span>
                            </td>

                        </tr>

                        <tr>

                            <td>Tax</td>

                            <td>
                                ₹
                                <span th:text="${price.tax}"></span>
                            </td>

                        </tr>

                        <tr>

                            <td>Service Charge</td>

                            <td>
                                ₹
                                <span th:text="${price.serviceCharge}"></span>
                            </td>

                        </tr>

                        <tr>

                            <td>Discount</td>

                            <td>
                                ₹
                                <span th:text="${price.discount}"></span>
                            </td>

                        </tr>

                        <tr class="table-success">

                            <th>Total</th>

                            <th>

                                ₹
                                <span th:text="${price.totalPrice}"></span>

                            </th>

                        </tr>

                    </table>

                    <form action="/confirm-booking"
                          method="post">

                        <input type="hidden"
                               name="code"
                               th:value="${tour.code}">

                        <button
                                class="btn btn-success w-100">

                            Confirm Booking

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
