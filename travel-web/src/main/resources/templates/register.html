<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Register</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        :root{
            --dusk-teal:#0B2E3C;
            --dusk-teal-deep:#071E28;
            --sunrise-gold:#E8A34D;
            --sunrise-gold-soft:#F3C583;
            --sand:#F7F0E4;
            --ink:#12242B;
            --coral:#D9704F;
            --paper:#FFFDF9;
        }

        body{

            min-height:100vh;

            background:
                    linear-gradient(180deg, rgba(7,30,40,.35) 0%, rgba(7,30,40,.55) 55%, rgba(7,20,28,.75) 100%),
                    url("https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?auto=format&fit=crop&w=1800&q=80");

            background-size:cover;

            background-position:center;

            background-attachment:fixed;

            display:flex;

            justify-content:center;

            align-items:center;

            font-family:'Inter','Segoe UI',sans-serif;

            color:var(--ink);

            position:relative;

            overflow-x:hidden;

            padding:24px;

        }

        h2,.logo-word{
            font-family:'Fraunces',Georgia,serif;
        }

        .overlay{

            position:absolute;

            inset:0;

            background:rgba(7,20,28,.28);

        }

        /* wayfinding compass watermark, echoes the login/home page signature */
        .compass-mark{
            position:absolute;
            z-index:1;
            right:-110px;
            bottom:-110px;
            width:420px;
            height:420px;
            opacity:.14;
            pointer-events:none;
        }

        .brand-bar{
            position:absolute;
            z-index:3;
            top:28px;
            left:48px;
            display:flex;
            align-items:center;
            gap:8px;
        }

        .brand-mark{
            color:var(--paper);
            font-size:20px;
            font-weight:600;
            letter-spacing:.02em;
            font-family:'Fraunces',Georgia,serif;
        }

        .brand-mark span{
            color:var(--sunrise-gold);
        }

        .login-card{

            position:relative;

            z-index:2;

            width:430px;

            max-width:100%;

            background:var(--paper);

            border-radius:20px;

            padding:44px 40px;

            box-shadow:0 30px 70px rgba(7,20,28,.45), 0 2px 0 rgba(255,255,255,.6) inset;

            border:1px solid rgba(255,255,255,.4);

        }

        .eyebrow{
            display:flex;
            align-items:center;
            justify-content:center;
            gap:10px;
            color:var(--coral);
            font-size:12px;
            letter-spacing:.2em;
            text-transform:uppercase;
            font-weight:600;
            margin-bottom:14px;
        }

        .eyebrow::before,
        .eyebrow::after{
            content:"";
            display:block;
            width:22px;
            height:1px;
            background:var(--coral);
            opacity:.5;
        }

        h2{

            font-weight:700;

            color:var(--dusk-teal);

            font-size:30px;

            margin-bottom:6px;

        }

        .text-muted{
            font-family:'Fraunces',Georgia,serif;
            font-style:italic;
            color:#5A6B70 !important;
            font-size:15px;
        }

        label{
            font-size:13px;
            font-weight:600;
            letter-spacing:.02em;
            color:var(--dusk-teal);
            margin-bottom:6px;
            display:inline-block;
        }

        .form-control{

            height:50px;

            border-radius:10px;

            border:1.5px solid #E4DDD0;

            background:var(--sand);

            font-size:15px;

            transition:.2s ease;

        }

        .form-control:focus{

            border-color:var(--sunrise-gold);

            background:var(--paper);

            box-shadow:0 0 0 .2rem rgba(232,163,77,.22);

        }

        .btn-login{

            height:50px;

            border-radius:10px;

            font-size:16px;

            font-weight:600;

            letter-spacing:.01em;

            background:var(--dusk-teal);

            border:none;

            color:var(--paper);

            transition:.25s ease;

        }

        .btn-login:hover,
        .btn-login:focus{

            background:var(--coral);

            color:var(--paper);

        }

        .btn-login:focus-visible{
            outline:3px solid var(--sunrise-gold-soft);
            outline-offset:2px;
        }

        .logo{

            font-size:42px;

            line-height:1;

            margin-bottom:6px;

        }

        hr{
            border-color:#E4DDD0;
            opacity:1;
            margin:26px 0 18px;
        }

        a{

            text-decoration:none;

            color:var(--coral);

            font-weight:600;

        }

        a:hover{
            color:var(--dusk-teal);
            text-decoration:underline;
        }

        .text-center.mb-4 p{
            margin-top:2px;
        }

        @media (max-width:480px){
            .brand-bar{ left:20px; top:20px; }
            .login-card{ padding:36px 26px; }
            .compass-mark{ width:260px; height:260px; right:-70px; bottom:-70px; }
        }

        @media (prefers-reduced-motion:reduce){
            .form-control, .btn-login, a{ transition:none; }
        }

    </style>

</head>

<body>

<div class="overlay"></div>

<svg class="compass-mark" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <circle cx="100" cy="100" r="98" fill="none" stroke="#F3C583" stroke-width="1"/>
    <circle cx="100" cy="100" r="80" fill="none" stroke="#F3C583" stroke-width="1"/>
    <g stroke="#F3C583" stroke-width="1">
        <line x1="100" y1="6" x2="100" y2="26"/>
        <line x1="100" y1="174" x2="100" y2="194"/>
        <line x1="6" y1="100" x2="26" y2="100"/>
        <line x1="174" y1="100" x2="194" y2="100"/>
    </g>
    <path d="M100 30 L112 100 L100 170 L88 100 Z" fill="#F3C583"/>
    <path d="M30 100 L100 88 L170 100 L100 112 Z" fill="#F3C583" opacity=".55"/>
    <circle cx="100" cy="100" r="5" fill="#F3C583"/>
</svg>

<div class="brand-bar">
    <span class="brand-mark">Dream<span>.</span>Destination</span>
</div>

<div class="login-card">

    <div class="text-center mb-4">

        <div class="logo">
            🌍
        </div>

        <span class="eyebrow">New Traveler</span>

        <h2>Create Account</h2>

        <p class="text-muted">

            Join us and start your journey

        </p>

    </div>

    <form action="/register" method="post">

        <div class="mb-3">

            <label>Full Name</label>

            <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Enter your full name"
                    required>

        </div>

        <div class="mb-3">

            <label>Email</label>

            <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="Enter your email"
                    required>

        </div>

        <div class="mb-4">

            <label>Password</label>

            <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Enter your password"
                    required>

        </div>

        <button class="btn btn-primary w-100 btn-login">

            Register

        </button>

    </form>

    <hr>

    <div class="text-center">

        Already have an account?

        <a href="/login">

            Login

        </a>

    </div>

</div>

</body>
</html>
