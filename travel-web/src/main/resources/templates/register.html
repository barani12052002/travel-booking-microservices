<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Register</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            height:100vh;

            background:url("https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?auto=format&fit=crop&w=1800&q=80");

            background-size:cover;

            background-position:center;

            display:flex;

            justify-content:center;

            align-items:center;

            font-family:'Segoe UI',sans-serif;

        }

        .overlay{

            position:absolute;
            inset:0;

            background:rgba(0,0,0,.55);

        }

        .register-card{

            position:relative;

            z-index:2;

            width:460px;

            background:white;

            border-radius:25px;

            padding:40px;

            box-shadow:0 20px 50px rgba(0,0,0,.35);

        }

        .logo{

            font-size:45px;

        }

        h2{

            color:#198754;

            font-weight:bold;

        }

        .form-control{

            height:50px;

            border-radius:12px;

        }

        .btn-register{

            height:50px;

            border-radius:12px;

            font-size:18px;

        }

        a{

            text-decoration:none;

        }

    </style>

</head>

<body>

<div class="overlay"></div>

<div class="register-card">

    <div class="text-center mb-4">

        <div class="logo">

            ✈️

        </div>

        <h2>Create Account</h2>

        <p class="text-muted">

            Start exploring beautiful destinations

        </p>

    </div>

    <form action="/register" method="post">

        <div class="mb-3">

            <label>Username</label>

            <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Enter username"
                    required>

        </div>

        <div class="mb-3">

            <label>Email</label>

            <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="Enter email"
                    required>

        </div>

        <div class="mb-4">

            <label>Password</label>

            <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Create password"
                    required>

        </div>

        <button class="btn btn-success w-100 btn-register">

            Register

        </button>

    </form>

    <hr>

    <div class="text-center">

        Already have an account?

        <a href="/login">

            Login

        </a>

    </div>

</div>

</body>
</html>
