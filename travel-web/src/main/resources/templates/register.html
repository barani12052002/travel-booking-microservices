<form action="/register" method="post">

    <input
            class="form-control"
            type="text"
            name="username"
            placeholder="Username"
            required>

    <input
            class="form-control mt-3"
            type="email"
            name="email"
            placeholder="Email"
            required>

    <input
            class="form-control mt-3"
            type="password"
            name="password"
            placeholder="Password"
            required>

    <button
            class="btn btn-primary mt-4 w-100">

        Register

    </button>

</form>
