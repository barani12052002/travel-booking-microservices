<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Search Tours</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f7fc;
            font-family:Segoe UI,sans-serif;
        }

        h2{
            font-weight:700;
            color:#1e3a8a;
        }

        .card{
            border:none;
            border-radius:18px;
            overflow:hidden;
            box-shadow:0 10px 25px rgba(0,0,0,.12);
            transition:.3s;
            height:100%;
        }

        .card:hover{
            transform:translateY(-8px);
        }

        .tour-img{
            width:100%;
            height:260px;
            object-fit:cover;
        }

        .price{
            font-size:22px;
            font-weight:bold;
            color:#0d6efd;
        }

        .rating{
            color:#f59e0b;
            font-weight:600;
        }

        .duration{
            color:#6c757d;
            font-size:14px;
        }

    </style>

</head>

<body>

<div class="container py-5">

    <h2 class="text-center mb-5">
        🌍 Available Attractions
    </h2>

    <div class="row g-4">

        <div class="col-lg-4 col-md-6"
             th:each="tour : ${attractions}">

            <div class="card">

                <img th:src="${tour.imageUrl}"
                     class="tour-img">

                <div class="card-body">

                    <h4 th:text="${tour.displayName}"></h4>

                    <p class="text-muted"
                       th:text="${tour.description}">
                    </p>

                    <p class="duration">
                        ⏳
                        <span th:text="${tour.duration}"></span>
                    </p>

                    <p class="rating">
                        ⭐
                        <span th:text="${tour.rating}"></span>
                    </p>

                    <p class="price">
                        ₹<span th:text="${tour.price}"></span>
                    </p>

                    <a th:href="@{/details(code=${tour.code})}"
                       class="btn btn-primary w-100">

                        View Details

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
