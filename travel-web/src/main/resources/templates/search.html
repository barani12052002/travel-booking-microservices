<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Search Tours</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <style>

        body{
            background:#f4f7fc;
            font-family:'Segoe UI',sans-serif;
        }

        h2{
            font-weight:700;
            color:#1e3a8a;
        }

        .search-box{
            border-radius:15px;
            overflow:hidden;
            box-shadow:0 8px 20px rgba(0,0,0,.12);
        }

        .search-box input{
            height:58px;
            border:none;
            font-size:18px;
        }

        .search-box button{
            width:160px;
        }

        .card{
            border:none;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 10px 25px rgba(0,0,0,.12);
            transition:.3s;
            height:100%;
        }

        .card:hover{

            transform:translateY(-8px);

            box-shadow:0 20px 40px rgba(0,0,0,.18);

        }

        .tour-img{

            width:100%;
            height:250px;
            object-fit:cover;

        }

        .price{

            color:#0d6efd;
            font-size:24px;
            font-weight:bold;

        }

        .rating{

            color:#f5b301;
            font-weight:bold;

        }

        .duration{

            color:#6c757d;

        }

        .description{

            min-height:50px;
            color:#666;

        }

    </style>

</head>

<body>

<div class="container py-5">

    <h2 class="text-center mb-4">

        🌍 Available Attractions

    </h2>

    <!-- Search -->

    <div class="row justify-content-center mb-5">

        <div class="col-lg-8">

            <div class="input-group search-box">

                <input

                        id="searchInput"

                        type="text"

                        class="form-control"

                        placeholder="Search destination (Goa, Ooty, Kerala...)">

                <button class="btn btn-primary">

                    <i class="bi bi-search"></i>

                    Search

                </button>

            </div>

        </div>

    </div>

    <!-- Cards -->

    <div class="row g-4">

        <div class="col-lg-4 col-md-6 tour-card"

             th:each="tour : ${attractions}">

            <div class="card">

                <img

                        th:src="${tour.imageUrl}"

                        class="tour-img">

                <div class="card-body">

                    <h4

                            th:text="${tour.displayName}">

                    </h4>

                    <p

                            class="description"

                            th:text="${tour.description}">

                    </p>

                    <div class="mb-2">

                        <span class="duration">

                            <i class="bi bi-clock"></i>

                            <span th:text="${tour.duration}"></span>

                        </span>

                    </div>

                    <div class="mb-2">

                        <span class="rating">

                            ⭐

                            <span th:text="${tour.rating}"></span>

                        </span>

                    </div>

                    <div class="price mb-3">

                        ₹<span th:text="${tour.price}"></span>

                    </div>

                    <a

                            th:href="@{/details(code=${tour.code})}"

                            class="btn btn-primary w-100">

                        View Details

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

    const searchInput=document.getElementById("searchInput");

    searchInput.addEventListener("keyup",function(){

        let value=this.value.toLowerCase();

        document.querySelectorAll(".tour-card").forEach(function(card){

            let text=card.innerText.toLowerCase();

            if(text.includes(value)){

                card.style.display="block";

            }else{

                card.style.display="none";

            }

        });

    });

</script>

</body>

</html>
