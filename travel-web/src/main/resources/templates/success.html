<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Booking Confirmed</title>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width,initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <style>

        body{

            background:#eef5ff;

            font-family:Segoe UI,sans-serif;

        }

        .success-card{

            border:none;

            border-radius:20px;

            box-shadow:0 15px 35px rgba(0,0,0,.12);

        }

        .check{

            font-size:80px;

        }

        .label{

            color:#6c757d;

            font-weight:600;

        }

        .value{

            font-size:18px;

            font-weight:bold;

        }

    </style>

</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card success-card">

                <div class="card-body p-5">

                    <div class="text-center">

                        <div class="check">

                            ✅

                        </div>

                        <h2 class="text-success">

                            Booking Confirmed

                        </h2>

                        <p class="text-muted">

                            Your booking has been confirmed successfully.

                        </p>

                    </div>

                    <hr>

                    <div class="row">

                        <div class="col-6">

                            <p class="label">

                                Booking Reference

                            </p>

                            <p class="value"
                               th:text="${booking.bookingReference}">
                            </p>

                        </div>

                        <div class="col-6">

                            <p class="label">

                                Status

                            </p>

                            <p class="value text-success"
                               th:text="${booking.bookingStatus}">
                            </p>

                        </div>

                        <div class="col-6">

                            <p class="label">

                                Travel Date

                            </p>

                            <p class="value"
                               th:text="${booking.travelDate}">
                            </p>

                        </div>

                        <div class="col-6">

                            <p class="label">

                                Time Slot

                            </p>

                            <p class="value"
                               th:text="${booking.timeSlot}">
                            </p>

                        </div>

                        <div class="col-6">

                            <p class="label">

                                Adults

                            </p>

                            <p class="value"
                               th:text="${booking.adultCount}">
                            </p>

                        </div>

                        <div class="col-6">

                            <p class="label">

                                Children

                            </p>

                            <p class="value"
                               th:text="${booking.childCount}">
                            </p>

                        </div>

                        <div class="col-6">

                            <p class="label">

                                Total Amount

                            </p>

                            <p class="value">

                                <span th:text="${booking.currency}"></span>

                                <span th:text="${booking.totalAmount}"></span>

                            </p>

                        </div>

                    </div>

                    <hr>

                    <div class="d-grid gap-3">

                        <a href="/bookings"
                           class="btn btn-primary btn-lg">

                            🎫 My Bookings

                        </a>

                        <a href="/dashboard"
                           class="btn btn-outline-success btn-lg">

                            🏠 Dashboard

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
