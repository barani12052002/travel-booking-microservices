<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Booking Success</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="alert alert-success">

        <h2>
            🎉 Booking Successful
        </h2>

        <hr>

        <h5>

            Reference :

            <span
                    th:text="${response.bookingReference}">
</span>

        </h5>

        <h5>

            Provider :

            <span
                    th:text="${response.providerName}">
</span>

        </h5>

        <h5>

            Status :

            <span
                    th:text="${response.bookingStatus}">
</span>

        </h5>

        <h5>

            Total :

            <span
                    th:text="${response.totalAmount}">
</span>

            <span
                    th:text="${response.currency}">
</span>

        </h5>

    </div>

    <a href="/"
       class="btn btn-primary">

        Home

    </a>

</div>

</body>

</html>
